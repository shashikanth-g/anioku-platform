name: anku

networks:
  anku-net:
    driver: bridge

volumes:
  postgres-data:
  frontend-node-modules:

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anku}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anku}
      POSTGRES_DB: ${POSTGRES_DB:-anku}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anku} -d ${POSTGRES_DB:-anku}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - anku-net

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - anku-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-anku}:${POSTGRES_PASSWORD:-anku}@postgres:5432/${POSTGRES_DB:-anku}
      REDIS_URL: redis://redis:6379/0
      PROJECTS_ROOT: /projects
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Backend orchestrates per-project sandbox containers, so it needs the host docker socket.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./projects_root:/projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anku-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - anku-net
    command: sh -c "npm install && npm run dev"
