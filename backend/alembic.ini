[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# sqlalchemy.url is intentionally omitted here — alembic/env.py reads the real
# connection string from app.core.config.settings (DATABASE_URL env var) so a
# single source of truth is shared with the running app.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
